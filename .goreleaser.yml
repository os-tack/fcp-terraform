version: 2

builds:
  - main: ./cmd/fcp-terraform
    binary: fcp-terraform
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - README.md
      - CLAUDE.md

checksum:
  name_template: checksums.txt
  algorithm: sha256

changelog:
  sort: asc

release:
  extra_files:
    - glob: scripts/install.sh
  footer: |
    ## Installation

    **Quick install (recommended):**
    ```bash
    curl -LsSf https://github.com/os-tack/fcp-terraform/releases/latest/download/install.sh | sh
    ```

    **Go install:**
    ```bash
    go install github.com/os-tack/fcp-terraform/cmd/fcp-terraform@latest
    ```

    **Binary download:** grab your platform's archive above and put `fcp-terraform` on your PATH.

    **MCP config:**
    ```json
    { "mcpServers": { "fcp-terraform": { "command": "fcp-terraform" } } }
    ```
